name: ci pipeline
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
#        with:
#            path: /home/ubuntu/myrepo
        #setup java
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
            java-version: '25'
            distribution: 'oracle'
            cache: 'maven'

      - name: Install dependencies
        run: |
            sudo apt install maven -y
      - name: check versions
        run: |
          java -version
          mvn -version
      - name: Build with maven
        run: |
          mvn clean install -DskipTests 