name: ci pipeline
on:
#  push:
#    branches: [main]
  workflow_dispatch:

jobs:
    # code build job
    build:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v3
            #with:
            #path: /home/ubuntu/myrepo
          
          - name: Snyk SCA (Software Component Analysis)
            uses: snyk/actions/maven-3-jdk-17@master
            continue-on-error: true # <--- Keeps pipeline going
            env:
              SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              JAVA_HOME: ''

            #setup java
          - name: Set up JDK 25
            uses: actions/setup-java@v4
            with:
              java-version: '25'
              distribution: 'oracle'
              cache: 'maven'

            # dependencies setup
          - name: Install dependencies
            run: |
                sudo apt install maven -y
            # check apps versions
          - name: check versions
            run: |
              java -version
              mvn -version
            
            #mvn build 
          - name: Build with maven
            run: |
              mvn clean install -DskipTests
            
            #artifact upload 
          - name: upload artifact
            uses: actions/upload-artifact@v4
            with:
              name: springboot-api-eks-hello 
              path: target/springboot-api-eks-hello*.jar
