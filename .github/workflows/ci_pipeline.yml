name: ci pipeline
on:
#  push:
#    branches: [main]
  workflow_dispatch:

jobs:
    # code build job
    build:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v3
            #with:
            #path: /home/ubuntu/myrepo

            #setup java
          - name: Set up JDK 25
            uses: actions/setup-java@v4
            with:
              java-version: '25'
              distribution: 'oracle'
              cache: 'maven'

            # dependencies setup
          - name: Install dependencies
            run: |
                sudo apt install maven -y
            # check apps versions
          - name: check versions
            run: |
              java -version
              mvn -version
            
            #mvn build 
          - name: Build with maven
            run: |
              mvn clean install -DskipTests
            
            #artifact upload 
          - name: upload artifact
            uses: actions/upload-artifact@v4
            with:
              name: springboot-api-eks-hello 
              path: target/springboot-api-eks-hello*.jar

    # code deploy job
    deploy:
        runs-on: ubuntu-latest
        steps:
          - name: download artifact 
            uses: actions/download-artifact@v4
            with:
                name: springboot-api-eks-hello 
            
            #key file
          - name: setup ec2 key
            run: |
                echo "${{ secrets.EC2_PEM}}" > key.pem
                chmod 400 key.pem 

          - name: copy file to ec2
            run: scp -i key.pem springboot-api-eks-hello/springboot-api-eks-hello*.jar ubuntu@1.1.1.1:/home/ubuntu/springboot-api-eks-hello.jar
            
            # jar execution
          - name: run jar on ec2
            run: |
                ssh -0 StrictHostKeyChecking=no -i key.pem ubuntu@1.1.1.1 << 'EOF'
                echo "SSH Success"
                cd /home/ubuntu
                echo "switched to home"
                nohup java -jar springboot-api-eks-hello.jar --server.port=8080 > out.log 2>&1 &
                echo "jar is running"
                ps -ef | grep java
            
